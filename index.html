<!DOCTYPE html>
<html lang="sv" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene.Gpt</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar for dark theme */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #2d3748; /* bg-gray-800 */
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #4a5568; /* bg-gray-700 */
            border-radius: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #6b7280; /* bg-gray-600 */
        }
    </style>
</head>
<body class="flex h-full text-gray-100 antialiased">
    <!-- Sidebar -->
    <aside class="w-80 bg-gray-800 p-6 flex flex-col shadow-lg overflow-y-auto">
        <h1 class="text-2xl font-bold mb-6 text-indigo-400">Rene.Gpt</h1>

        <!-- API Key Management -->
        <div class="mb-8">
            <h2 class="text-lg font-semibold mb-4 text-gray-200">API-nycklar</h2>
            <div class="mb-4">
                <label for="openrouterApiKey" class="block text-sm font-medium text-gray-300 mb-1">OpenRouter Nyckel:</label>
                <input type="password" id="openrouterApiKey" class="w-full p-2 rounded-md bg-gray-700 border border-gray-600 text-gray-100 focus:ring-indigo-500 focus:border-indigo-500">
                <button id="saveOpenrouterKey" class="mt-2 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md transition duration-200">Spara OpenRouter Nyckel</button>
            </div>
        </div>

        <!-- Model Selector -->
        <div class="mt-6 mb-8">
            <h2 class="text-lg font-semibold mb-4 pb-2 border-b border-gray-600 text-gray-200">Modellväljare</h2>
            <div class="mb-4">
                <label for="modelCategory" class="block text-sm font-medium text-gray-300 mb-1">Kategori:</label>
                <select id="modelCategory" class="w-full p-2 rounded-md bg-gray-700 border border-gray-600 text-gray-100 focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="fast">Snabb</option>
                    <option value="reasoning">Resonemang</option>
                    <option value="coding">Kodning</option>
                    <option value="images">Bilder</option>
                    <option value="other">Övrigt</option>
                </select>
            </div>
            <div>
                <label for="selectedModel" class="block text-sm font-medium text-gray-300 mb-1">Modell:</label>
                <select id="selectedModel" class="w-full p-2 rounded-md bg-gray-700 border border-gray-600 text-gray-100 focus:ring-indigo-500 focus:border-indigo-500">
                    <!-- Options will be populated by JavaScript -->
                </select>
            </div>
        </div>
    </aside>

    <!-- Main Chat Window -->
    <main class="flex-1 flex flex-col bg-gray-900">
        <header class="bg-gray-800 p-4 shadow-md">
            <h2 class="text-xl font-semibold text-gray-200">Chatt</h2>
        </header>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-4 chat-messages">
            <!-- Chat messages will be appended here -->
            <div class="flex justify-start">
                <div class="bg-gray-700 p-3 rounded-lg max-w-xl">
                    <p class="text-sm">Hej! Hur kan jag hjälpa dig idag?</p>
                </div>
            </div>
        </div>

        <div class="p-6 bg-gray-800 border-t border-gray-700 flex items-center">
            <input type="text" id="userMessageInput" placeholder="Skriv ditt meddelande..." class="flex-1 p-3 rounded-lg bg-gray-700 border border-gray-600 text-gray-100 focus:ring-indigo-500 focus:border-indigo-500 mr-4">
            <button id="sendMessageButton" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">Skicka</button>
        </div>
    </main>

    <script>
        const openrouterApiKeyInput = document.getElementById('openrouterApiKey');
        const saveOpenrouterKeyButton = document.getElementById('saveOpenrouterKey');
        const modelCategorySelect = document.getElementById('modelCategory');
        const selectedModelSelect = document.getElementById('selectedModel');
        const chatMessagesDiv = document.getElementById('chatMessages');
        const userMessageInput = document.getElementById('userMessageInput');
        const sendMessageButton = document.getElementById('sendMessageButton');

        let openrouterApiKey = '';

        // --- API Key Management ---
        function loadApiKeys() {
            openrouterApiKey = localStorage.getItem('openrouterApiKey') || '';
            openrouterApiKeyInput.value = openrouterApiKey;
        }

        saveOpenrouterKeyButton.addEventListener('click', () => {
            openrouterApiKey = openrouterApiKeyInput.value;
            localStorage.setItem('openrouterApiKey', openrouterApiKey);
            alert('OpenRouter-nyckel sparad!');
        });

        // --- Model Selection ---
        const models = {
            fast: [
                { id: 'google/gemini-2.5-flash', name: 'Google Gemini 2.5 Flash' },
                { id: 'google/gemini-2.5-pro', name: 'Google Gemini 2.5 Pro' },
                { id: 'mistralai/mistral-7b-instruct-v0.1', name: 'Mistral 7B Instruct v0.1 (OpenRouter)' }
            ],
            reasoning: [
                { id: 'liquid/lfm-2.5-1.2b-thinking:free', name: 'Liquid LFM 2.5 1.2B (Thinking)' },
                { id: 'nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free', name: 'Nemotron 3 Nano Omni 30B (Reasoning)' },
                { id: 'openai/gpt-oss-120b:free', name: 'GPT OSS 120B' },
                { id: 'openai/gpt-oss-20b:free', name: 'GPT OSS 20B' },
                { id: 'qwen/qwen3-next-80b-a3b-instruct:free', name: 'Qwen3 Next 80B A3B Instruct' },
                { id: 'minimax/minimax-m2.5:free', name: 'Minimax M2.5' },
                { id: 'z-ai/glm-4.5-air:free', name: 'GLM 4.5 Air' },
                { id: 'inclusionai/ling-2.6-1t:free', name: 'Ling 2.6 1T' }
            ],
            coding: [
                { id: 'baidu/cobuddy:free', name: 'Cobuddy' },
                { id: 'qwen/qwen3-coder:free', name: 'Qwen3 Coder' },
                { id: 'poolside/laguna-m.1:free', name: 'Laguna M.1' },
                { id: 'poolside/laguna-xs.2:free', name: 'Laguna XS.2' },
                { id: 'tencent/hy3-preview:free', name: 'Hy3 Preview' }
            ],
            images: [
                { id: 'baidu/qianfan-ocr-fast:free', name: 'Qianfan OCR Fast' },
                { id: 'nvidia/nemotron-nano-12b-v2-vl:free', name: 'Nemotron Nano 12B V2 VL' }
            ],
            other: [
                { id: 'liquid/lfm-2.5-1.2b-instruct:free', name: 'Liquid LFM 2.5 1.2B (Instruct)' },
                { id: 'meta-llama/llama-3.3-70b-instruct:free', name: 'Llama 3.3 70B (Instruct)' },
                { id: 'meta-llama/llama-3.2-3b-instruct:free', name: 'Llama 3.2 3B (Instruct)' },
                { id: 'cognitivecomputations/dolphin-mistral-24b-venice-edition:free', name: 'Dolphin Mistral 24B Venice Edition' },
                { id: 'nousresearch/hermes-3-llama-3.1-405b:free', name: 'Hermes 3 (Llama 3.1 405B)' },
                { id: 'google/gemma-4-26b-a4b-it:free', name: 'Gemma 4 26B A4B IT' },
                { id: 'google/gemma-4-31b-it:free', name: 'Gemma 4 31B IT' },
                { id: 'nvidia/nemotron-3-nano-30b-a3b:free', name: 'Nemotron 3 Nano 30B A3B' },
                { id: 'nvidia/nemotron-3-super-120b-a12b:free', name: 'Nemotron 3 Super 120B A12B' },
                { id: 'nvidia/nemotron-nano-9b-v2:free', name: 'Nemotron Nano 9B V2' },
                { id: 'openrouter/free', name: 'OpenRouter Free' },
                { id: 'openrouter/owl-alpha', name: 'Owl Alpha' }
            ]
        };

        function populateModels() {
            const category = modelCategorySelect.value;
            const categoryModels = models[category] || [];
            selectedModelSelect.innerHTML = ''; // Clear existing options

            categoryModels.forEach(model => {
                const option = document.createElement('option');
                option.value = model.id;
                option.textContent = model.name;
                selectedModelSelect.appendChild(option);
            });
        }

        modelCategorySelect.addEventListener('change', populateModels);

        // --- Chat Logic ---
        function addMessage(sender, message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('flex', sender === 'user' ? 'justify-end' : 'justify-start');
            messageElement.innerHTML = `
                <div class="p-3 rounded-lg max-w-xl ${sender === 'user' ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-gray-100'}">
                    <p class="text-sm">${message}</p>
                </div>
            `;
            chatMessagesDiv.appendChild(messageElement);
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight; // Auto-scroll to latest message
        }

        async function sendMessage() {
            const userMessage = userMessageInput.value.trim();
            if (!userMessage) return;

            addMessage('user', userMessage);
            userMessageInput.value = ''; // Clear input

            const selectedModelId = selectedModelSelect.value;
            let aiResponse = "Jag kunde inte få svar från AI:n. Kontrollera dina API-nycklar eller försök igen senare.";

            // Show a "thinking" message
            const thinkingMessageElement = document.createElement('div');
            thinkingMessageElement.classList.add('flex', 'justify-start');
            thinkingMessageElement.innerHTML = `
                <div class="bg-gray-700 p-3 rounded-lg max-w-xl text-gray-100">
                    <p class="text-sm animate-pulse">AI tänker...</p>
                </div>
            `;
            chatMessagesDiv.appendChild(thinkingMessageElement);
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;

            try {
                if (!openrouterApiKey) {
                    aiResponse = "Vänligen ange din OpenRouter API-nyckel i sidofältet.";
                } else {
                    // Console log before request
                    console.log('Sending request to OpenRouter:', {
                        selectedModel: selectedModelId,
                        apiKeyExists: !!openrouterApiKey,
                        endpoint: 'https://openrouter.ai/api/v1/chat/completions'
                    });

                    aiResponse = await sendToOpenRouter(userMessage, selectedModelId);
                }
            } catch (error) {
                console.error("Fel vid skickande av meddelande till AI:", error);
                aiResponse = `Ett fel uppstod: ${error.message || error}`;
            } finally {
                // Remove the "thinking" message before adding the actual response
                chatMessagesDiv.removeChild(thinkingMessageElement);
                addMessage('ai', aiResponse);
            }
        }

        async function sendToOpenRouter(message, model) {
            const url = 'https://openrouter.ai/api/v1/chat/completions';
            const referer = window.location.origin || 'http://localhost';

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${openrouterApiKey}`,
                    'Content-Type': 'application/json',
                    'HTTP-Referer': referer,
                    'X-Title': 'rene.gpt'
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: "user", content: message }
                    ]
                })
            });

            if (!response.ok) {
                const status = response.status;
                let openRouterMessage = '';
                try {
                    const errorData = await response.json();
                    openRouterMessage = errorData.error?.message || JSON.stringify(errorData);
                    console.error('OpenRouter API Error:', { status, errorData });
                } catch (e) {
                    openRouterMessage = response.statusText;
                    console.error('OpenRouter API Error:', { status, statusText: response.statusText });
                }

                let errorMsg = '';
                switch (status) {
                    case 401:
                        errorMsg = "API key missing or invalid";
                        break;
                    case 402:
                        errorMsg = "OpenRouter credits/balance problem";
                        break;
                    case 404:
                        errorMsg = "Model ID not found or no endpoint available";
                        break;
                    case 429:
                        errorMsg = "Rate limited by OpenRouter or upstream provider";
                        break;
                    case 400:
                        errorMsg = `OpenRouter message: ${openRouterMessage}`;
                        break;
                    default:
                        errorMsg = `HTTP ${status}: ${openRouterMessage}`;
                }

                throw new Error(`Model: ${model}, Status: ${status}, Error: ${errorMsg}`);
            }

            const data = await response.json();
            if (data.choices && data.choices.length > 0 && data.choices[0].message) {
                return data.choices[0].message.content;
            } else {
                return "Inget svar från OpenRouter.";
            }
        }

        sendMessageButton.addEventListener('click', sendMessage);
        userMessageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            loadApiKeys();
            populateModels();
            selectedModelSelect.value = 'openrouter/free'; // Ställ in OpenRouter Free som standardmodell
        });
    </script>
</body>
</html>
