<!DOCTYPE html>
<html lang="sv" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene.Gpt</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar for dark theme */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #2d3748; /* bg-gray-800 */
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #4a5568; /* bg-gray-700 */
            border-radius: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #6b7280; /* bg-gray-600 */
        }
    </style>
</head>
<body class="flex h-full text-gray-100 antialiased">
    <!-- Sidebar -->
    <aside class="w-80 bg-gray-800 p-6 flex flex-col shadow-lg overflow-y-auto">
        <h1 class="text-2xl font-bold mb-6 text-indigo-400">Rene.Gpt</h1>

        <!-- Model Selector -->
        <div class="mt-6 mb-8">
            <h2 class="text-lg font-semibold mb-4 pb-2 border-b border-gray-600 text-gray-200">Modellväljare</h2>
            <div class="mb-4">
                <label for="modelCategory" class="block text-sm font-medium text-gray-300 mb-1">Kategori:</label>
                <select id="modelCategory" class="w-full p-2 rounded-md bg-gray-700 border border-gray-600 text-gray-100 focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="fast">Snabb</option>
                    <option value="reasoning">Resonemang</option>
                    <option value="coding">Kodning</option>
                    <option value="images">Bilder</option>
                    <option value="gemini">Gemini</option>
                    <option value="other">Övrigt</option>
                </select>
            </div>
            <div>
                <label for="selectedModel" class="block text-sm font-medium text-gray-300 mb-1">Modell:</label>
                <select id="selectedModel" class="w-full p-2 rounded-md bg-gray-700 border border-gray-600 text-gray-100 focus:ring-indigo-500 focus:border-indigo-500">
                    <!-- Options will be populated by JavaScript -->
                </select>
            </div>
        </div>
    </aside>

    <!-- Main Chat Window -->
    <main class="flex-1 flex flex-col bg-gray-900">
        <header class="bg-gray-800 p-4 shadow-md">
            <h2 class="text-xl font-semibold text-gray-200">Chatt</h2>
        </header>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-4 chat-messages">
            <!-- Chat messages will be appended here -->
            <div class="flex justify-start">
                <div class="bg-gray-700 p-3 rounded-lg max-w-xl">
                    <p class="text-sm">Hej! Hur kan jag hjälpa dig idag?</p>
                </div>
            </div>
        </div>

        <div class="p-6 bg-gray-800 border-t border-gray-700 flex flex-col gap-2">
            <!-- Image preview container -->
            <div id="imagePreviewContainer" class="hidden w-full flex items-center gap-2 p-2 bg-gray-700 rounded-lg">
                <img id="imagePreviewThumbnail" class="h-10 w-10 object-cover rounded" alt="Bildförhandsvisning">
                <span id="imagePreviewFilename" class="text-sm text-gray-200 flex-1 truncate"></span>
                <button id="removeImageButton" class="text-red-400 hover:text-red-300 text-lg leading-none ml-2">✕</button>
            </div>
            <!-- Input row -->
            <div class="flex items-center w-full">
                <input type="text" id="userMessageInput" placeholder="Skriv ditt meddelande..." class="flex-1 p-3 rounded-lg bg-gray-700 border border-gray-600 text-gray-100 focus:ring-indigo-500 focus:border-indigo-500 mr-4">
                <!-- Image upload button -->
                <label for="imageUploadInput" class="cursor-pointer p-3 rounded-lg bg-gray-700 border border-gray-600 hover:bg-gray-600 mr-2 flex items-center justify-center" title="Ladda upp bild">
                    🖼️
                </label>
                <input type="file" id="imageUploadInput" accept="image/png, image/jpeg, image/webp, image/gif" class="hidden">
                <button id="sendMessageButton" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">Skicka</button>
            </div>
        </div>
    </main>

    <script>
        const modelCategorySelect = document.getElementById('modelCategory');
        const selectedModelSelect = document.getElementById('selectedModel');
        const chatMessagesDiv = document.getElementById('chatMessages');
        const userMessageInput = document.getElementById('userMessageInput');
        const sendMessageButton = document.getElementById('sendMessageButton');
        const imageUploadInput = document.getElementById('imageUploadInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreviewThumbnail = document.getElementById('imagePreviewThumbnail');
        const imagePreviewFilename = document.getElementById('imagePreviewFilename');
        const removeImageButton = document.getElementById('removeImageButton');

        let conversationMessages = [];
        let selectedImageDataUrl = null;
        let selectedImageMimeType = null;
        let selectedImageFilename = null;

        // --- Model Selection ---
        const models = {
            fast: [
                { provider: 'openrouter', id: 'tencent/hy3-preview:free', name: 'Tencent Hy3 Preview Free' },
                { provider: 'openrouter', id: 'google/gemini-2.5-flash', name: 'Google Gemini 2.5 Flash' },
                { provider: 'openrouter', id: 'google/gemini-2.5-pro', name: 'Google Gemini 2.5 Pro' },
                { provider: 'openrouter', id: 'mistralai/mistral-7b-instruct-v0.1', name: 'Mistral 7B Instruct v0.1 (OpenRouter)' }
            ],
            reasoning: [
                { provider: 'openrouter', id: 'liquid/lfm-2.5-1.2b-thinking:free', name: 'Liquid LFM 2.5 1.2B (Thinking)' },
                { provider: 'openrouter', id: 'nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free', name: 'Nemotron 3 Nano Omni 30B (Reasoning)' },
                { provider: 'openrouter', id: 'openai/gpt-oss-120b:free', name: 'GPT OSS 120B' },
                { provider: 'openrouter', id: 'openai/gpt-oss-20b:free', name: 'GPT OSS 20B' },
                { provider: 'openrouter', id: 'qwen/qwen3-next-80b-a3b-instruct:free', name: 'Qwen3 Next 80B A3B Instruct' },
                { provider: 'openrouter', id: 'minimax/minimax-m2.5:free', name: 'Minimax M2.5' },
                { provider: 'openrouter', id: 'z-ai/glm-4.5-air:free', name: 'GLM 4.5 Air' },
                { provider: 'openrouter', id: 'inclusionai/ling-2.6-1t:free', name: 'Ling 2.6 1T' }
            ],
            coding: [
                { provider: 'openrouter', id: 'baidu/cobuddy:free', name: 'Cobuddy' },
                { provider: 'openrouter', id: 'qwen/qwen3-coder:free', name: 'Qwen3 Coder' },
                { provider: 'openrouter', id: 'poolside/laguna-m.1:free', name: 'Laguna M.1' },
                { provider: 'openrouter', id: 'poolside/laguna-xs.2:free', name: 'Laguna XS.2' }
            ],
            images: [
                { provider: 'openrouter', id: 'baidu/qianfan-ocr-fast:free', name: 'Qianfan OCR Fast', supportsImages: true },
                { provider: 'openrouter', id: 'nvidia/nemotron-nano-12b-v2-vl:free', name: 'Nemotron Nano 12B V2 VL', supportsImages: true }
            ],
            gemini: [
                { provider: 'gemini', id: 'gemini-3-flash-preview', name: 'Gemini 3 Flash Preview', supportsImages: true },
                { provider: 'gemini', id: 'gemini-3.1-flash-lite-preview', name: 'Gemini 3.1 Flash-Lite Preview', supportsImages: true },
                { provider: 'gemini', id: 'gemini-2.5-flash', name: 'Gemini 2.5 Flash', supportsImages: true },
                { provider: 'gemini', id: 'gemini-2.5-flash-lite', name: 'Gemini 2.5 Flash-Lite', supportsImages: true },
                { provider: 'gemini', id: 'gemini-2.5-pro', name: 'Gemini 2.5 Pro', supportsImages: true }
            ],
            other: [
                { provider: 'openrouter', id: 'liquid/lfm-2.5-1.2b-instruct:free', name: 'Liquid LFM 2.5 1.2B (Instruct)' },
                { provider: 'openrouter', id: 'meta-llama/llama-3.3-70b-instruct:free', name: 'Llama 3.3 70B (Instruct)' },
                { provider: 'openrouter', id: 'meta-llama/llama-3.2-3b-instruct:free', name: 'Llama 3.2 3B (Instruct)' },
                { provider: 'openrouter', id: 'cognitivecomputations/dolphin-mistral-24b-venice-edition:free', name: 'Dolphin Mistral 24B Venice Edition' },
                { provider: 'openrouter', id: 'nousresearch/hermes-3-llama-3.1-405b:free', name: 'Hermes 3 (Llama 3.1 405B)' },
                { provider: 'openrouter', id: 'google/gemma-4-26b-a4b-it:free', name: 'Gemma 4 26B A4B IT' },
                { provider: 'openrouter', id: 'google/gemma-4-31b-it:free', name: 'Gemma 4 31B IT' },
                { provider: 'openrouter', id: 'nvidia/nemotron-3-nano-30b-a3b:free', name: 'Nemotron 3 Nano 30B A3B' },
                { provider: 'openrouter', id: 'nvidia/nemotron-3-super-120b-a12b:free', name: 'Nemotron 3 Super 120B A12B' },
                { provider: 'openrouter', id: 'nvidia/nemotron-nano-9b-v2:free', name: 'Nemotron Nano 9B V2' },
                { provider: 'openrouter', id: 'openrouter/free', name: 'OpenRouter Free' },
                { provider: 'openrouter', id: 'openrouter/owl-alpha', name: 'Owl Alpha' }
            ]
        };

        function populateModels() {
            const category = modelCategorySelect.value;
            const categoryModels = models[category] || [];
            selectedModelSelect.innerHTML = ''; // Clear existing options

            categoryModels.forEach(model => {
                const option = document.createElement('option');
                option.value = model.id;
                option.textContent = model.name;
                option.dataset.provider = model.provider;
                if (model.supportsImages) {
                    option.dataset.supportsImages = 'true';
                }
                selectedModelSelect.appendChild(option);
            });
        }

        modelCategorySelect.addEventListener('change', populateModels);

        // --- Image Upload Handling ---
        imageUploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Check file type
            const acceptedTypes = ['image/png', 'image/jpeg', 'image/webp', 'image/gif'];
            if (!acceptedTypes.includes(file.type)) {
                addMessage('ai', 'Endast bildfiler (PNG, JPEG, WebP, GIF) stöds.');
                imageUploadInput.value = '';
                return;
            }

            // Check file size (3MB binary to avoid 4MB base64 limit)
            const maxFileSize = 3 * 1024 * 1024; // 3MB
            if (file.size > maxFileSize) {
                addMessage('ai', 'Image is too large. Try a smaller image.');
                imageUploadInput.value = '';
                return;
            }

            // Read file as base64 data URL
            const reader = new FileReader();
            reader.onload = (event) => {
                selectedImageDataUrl = event.target.result;
                selectedImageMimeType = file.type;
                selectedImageFilename = file.name;

                // Show preview
                imagePreviewThumbnail.src = selectedImageDataUrl;
                imagePreviewFilename.textContent = file.name;
                imagePreviewContainer.classList.remove('hidden');
            };
            reader.onerror = () => {
                addMessage('ai', 'Kunde inte läsa bildfilen.');
                imageUploadInput.value = '';
            };
            reader.readAsDataURL(file);
        });

        removeImageButton.addEventListener('click', () => {
            selectedImageDataUrl = null;
            selectedImageMimeType = null;
            selectedImageFilename = null;
            imagePreviewContainer.classList.add('hidden');
            imagePreviewThumbnail.src = '';
            imageUploadInput.value = '';
        });

        // --- Chat Logic ---
        function addMessage(sender, message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('flex', sender === 'user' ? 'justify-end' : 'justify-start');
            messageElement.innerHTML = `
                <div class="p-3 rounded-lg max-w-xl ${sender === 'user' ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-gray-100'}">
                    <p class="text-sm">${message}</p>
                </div>
            `;
            chatMessagesDiv.appendChild(messageElement);
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight; // Auto-scroll to latest message
        }

        async function sendMessage() {
            const userMessage = userMessageInput.value.trim();
            if (!userMessage && !selectedImageDataUrl) return;

            // Check if image is selected and model supports images
            if (selectedImageDataUrl) {
                const selectedOption = selectedModelSelect.options[selectedModelSelect.selectedIndex];
                const supportsImages = selectedOption.dataset.supportsImages === 'true';
                if (!supportsImages) {
                    addMessage('ai', 'Choose a vision-capable model for image input.');
                    return;
                }
            }

            // Add user message to conversation history
            conversationMessages.push({ role: 'user', content: userMessage || '' });
            addMessage('user', userMessage || '[Bild]');
            userMessageInput.value = ''; // Clear input

            // Get selected model and provider
            const selectedOption = selectedModelSelect.options[selectedModelSelect.selectedIndex];
            const provider = selectedOption.dataset.provider;
            const modelId = selectedOption.value;

            // Show a "thinking" message
            const thinkingMessageElement = document.createElement('div');
            thinkingMessageElement.classList.add('flex', 'justify-start');
            thinkingMessageElement.innerHTML = `
                <div class="bg-gray-700 p-3 rounded-lg max-w-xl text-gray-100">
                    <p class="text-sm animate-pulse">AI tänker...</p>
                </div>
            `;
            chatMessagesDiv.appendChild(thinkingMessageElement);
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: conversationMessages,
                        provider: provider,
                        model: modelId,
                        ...(selectedImageDataUrl && { imageDataUrl: selectedImageDataUrl, imageMimeType: selectedImageMimeType })
                    })
                });

                const responseData = await response.json();

                if (!response.ok) {
                    const errorMsg = responseData.error || `HTTP ${response.status}: ${response.statusText}`;
                    chatMessagesDiv.removeChild(thinkingMessageElement);
                    addMessage('ai', `Fel: ${errorMsg}`);
                    return;
                }

                const aiResponse = responseData.text;
                // Add AI response to conversation history
                conversationMessages.push({ role: 'assistant', content: aiResponse });

                // Remove the "thinking" message
                chatMessagesDiv.removeChild(thinkingMessageElement);

                // Add AI message
                addMessage('ai', aiResponse);

                // Add provider/model status line
                const statusLine = document.createElement('div');
                statusLine.classList.add('flex', 'justify-start', 'mt-1');
                let statusText = '';
                if (responseData.fallbackUsed) {
                    statusText = `Fallback used: ${responseData.providerUsed} · ${responseData.modelUsed}`;
                } else {
                    statusText = `Used ${responseData.providerUsed} · ${responseData.modelUsed}`;
                }
                statusLine.innerHTML = `<span class="text-xs text-gray-400">${statusText}</span>`;
                chatMessagesDiv.appendChild(statusLine);
                chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;

                // Clear image preview after successful send
                selectedImageDataUrl = null;
                selectedImageMimeType = null;
                selectedImageFilename = null;
                imagePreviewContainer.classList.add('hidden');
                imagePreviewThumbnail.src = '';
                imageUploadInput.value = '';

            } catch (error) {
                console.error("Fel vid skickande av meddelande till API:", error);
                chatMessagesDiv.removeChild(thinkingMessageElement);
                addMessage('ai', `Ett fel uppstod: ${error.message}`);
            }
        }

        sendMessageButton.addEventListener('click', sendMessage);
        userMessageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            populateModels();
            // Set default model to tencent/hy3-preview:free
            selectedModelSelect.value = 'tencent/hy3-preview:free';
        });
    </script>
</body>
</html>
